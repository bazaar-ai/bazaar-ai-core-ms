databaseChangeLog:
  - changeSet:
      id: 05-22062026-create-invoices-table
      author: Jahangir Alisoy
      changes:
        - createTable:
            tableName: invoices
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: invoice_code
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: buyer
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: DECIMAL(19,4)
                  constraints:
                    nullable: false
              - column:
                  name: invoice_status
                  type: varchar(255)
                  defaultValue: 'ELIGIBLE'
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false